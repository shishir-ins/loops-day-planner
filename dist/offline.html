<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loops Day Planner</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(160deg, #f0fdf4 0%, #ffffff 100%);
        color: #14532d;
      }

      main {
        max-width: 28rem;
        padding: 2rem;
        margin: 1.5rem;
        border-radius: 1.5rem;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(34, 197, 94, 0.18);
        box-shadow: 0 20px 60px rgba(34, 197, 94, 0.12);
        text-align: center;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.8rem;
      }

      p {
        margin: 0;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Offline for a moment</h1>
      <p>The planner shell is installed, but this page needs a connection right now. Reopen the app when you are back online.</p>
    </main>
  </body>
</html>
